version: '3.9'

services:
  ai-backend:
    image: node:20-slim
    working_dir: /app
    ports:
      - '8080:8080'
    environment:
      - NODE_ENV=development
      - PORT=8080
      - SHOPIFY_STORE=maestro-ai-qrc97.myshopify.com
    volumes:
      - ./ai-backend:/app
    command: >
      bash -c "
      npm install &&
      npm start
      "

  admin-dashboard:
    image: node:20-slim
    working_dir: /app
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://localhost:8080
    volumes:
      - ./admin-dashboard:/app
    command: >
      bash -c "
      npm install &&
      npm run dev
      "

networks:
  default:
    driver: bridge