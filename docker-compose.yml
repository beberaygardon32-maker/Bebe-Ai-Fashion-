version: '3.9'

services:
  ai-backend:
    build:
      context: ./ai-backend
    ports:
      - '8080:8080'
    environment:
      - NODE_ENV=development
      - PORT=8080
      - SHOPIFY_STORE=maestro-ai-qrc97.myshopify.com
    volumes:
      - ./ai-backend:/app
      - /app/node_modules

  admin-dashboard:
    build:
      context: ./admin-dashboard
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://localhost:8080
    volumes:
      - ./admin-dashboard:/app
      - /app/node_modules

networks:
  default:
    driver: bridge